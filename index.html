<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机屏幕，NFC打开自动适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱志鑫 - 每当你(only)</title>
    <style>
        /* 极简美观的播放页样式，手机端完美适配 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft Yahei", sans-serif;
            color: white;
            padding: 20px;
        }
        .player-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <h1>每当你(only)</h1>
        <p class="subtitle">朱志鑫</p >
        <!-- 音频标签，直接播放only.mp3 -->
        <audio controls autoplay>
            <source src="only.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放，请更新浏览器。
        
    </div>
</body>
</html>
